name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Install libpcap (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y libpcap-dev

      - name: Install libpcap (macOS)
        if: runner.os == 'macOS'
        run: brew install libpcap

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test
        # Tests in capture/ require root for pcap; skip those with build tag.
        # aggregate/ and correlate/ tests run without privileges.
        run: go test -v -count=1 ./internal/aggregate/... ./internal/correlate/...

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Install libpcap (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y libpcap-dev

      - name: Install libpcap (macOS)
        if: runner.os == 'macOS'
        run: brew install libpcap

      - name: Download dependencies
        run: go mod download

      - name: Build
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          CGO_ENABLED=1 go build -trimpath \
            -ldflags "-s -w -X main.version=${VERSION}" \
            -o mcp-flowsentinel .

      - name: Verify binary
        run: ./mcp-flowsentinel --version

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: mcp-flowsentinel-${{ matrix.os }}
          path: mcp-flowsentinel
          retention-days: 7
