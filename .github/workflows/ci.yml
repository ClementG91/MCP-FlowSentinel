name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Build + Test ─────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      # ── Platform libpcap setup ─────────────────────────────────────────────
      - name: Install libpcap (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y libpcap-dev

      - name: Install libpcap (macOS)
        if: runner.os == 'macOS'
        run: brew install libpcap

      # The Npcap SDK provides wpcap.lib for CGO linkage at compile time.
      # The Npcap *driver* is not available on GitHub Windows runners, so any
      # test that would call pcap.OpenLive() is excluded on Windows.
      - name: Download Npcap SDK (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://npcap.com/dist/npcap-sdk-1.13.zip" -OutFile npcap-sdk.zip
          Expand-Archive npcap-sdk.zip -DestinationPath C:\npcap-sdk
          Add-Content $env:GITHUB_ENV "CGO_CFLAGS=-IC:\npcap-sdk\Include"
          Add-Content $env:GITHUB_ENV "CGO_LDFLAGS=-LC:\npcap-sdk\Lib\x64"

      - name: Download dependencies
        run: go mod download

      # ── go vet (all platforms) ─────────────────────────────────────────────
      - name: go vet
        run: go vet ./...

      # ── Full build (all platforms) ─────────────────────────────────────────
      - name: Build
        run: go build ./...

      # ── Tests + race detector (Linux / macOS) ─────────────────────────────
      - name: Test with race detector
        if: runner.os != 'Windows'
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...

      # ── Tests (Windows — exclude packages requiring the pcap runtime) ──────
      # capture, daemon, and tools/analyze_network need the Npcap driver at
      # runtime, which is not available on GitHub Windows runners.
      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: >
          go test
          ./internal/aggregate/...
          ./internal/alerting/...
          ./internal/cache/...
          ./internal/config/...
          ./internal/correlate/...
          ./internal/daemon/...
          ./internal/history/...
          ./internal/intel/...
          ./internal/ja3/...
          ./internal/tools/...
          ./internal/updater/...

      # ── Coverage gate: fail if total < 70 % (Linux only) ──────────────────
      - name: Enforce coverage ≥ 70%
        if: runner.os == 'Linux'
        run: |
          TOTAL=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${TOTAL}%"
          python3 -c "import sys; cov=float('${TOTAL}'); sys.exit(0 if cov>=70 else 1)" \
            || (echo "::error::Coverage ${TOTAL}% is below the 70% minimum" && exit 1)

      - name: Upload coverage report
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          retention-days: 14

  # ── staticcheck ──────────────────────────────────────────────────────────────
  staticcheck:
    name: staticcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Install libpcap
        run: sudo apt-get update -qq && sudo apt-get install -y libpcap-dev
      - uses: dominikh/staticcheck-action@v1
        with:
          version: "latest"
          install-go: false

  # ── govulncheck — known CVEs in Go dependencies ───────────────────────────────
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Install libpcap
        run: sudo apt-get update -qq && sudo apt-get install -y libpcap-dev
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...
