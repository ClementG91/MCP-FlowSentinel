name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write  # required for SLSA / SBOM attestation (future use)

jobs:
  # ── Linux amd64 ──────────────────────────────────────────────────────────────
  build-linux-amd64:
    name: Build linux/amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Install libpcap
        run: sudo apt-get update -qq && sudo apt-get install -y libpcap-dev
      - name: Build
        run: |
          mkdir -p dist
          CGO_ENABLED=1 GOOS=linux GOARCH=amd64 \
            go build -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o dist/mcp-flowsentinel-linux-amd64 .
      - uses: actions/upload-artifact@v4
        with:
          name: bin-linux-amd64
          path: dist/

  # ── Linux arm64 (native GitHub ARM runner) ───────────────────────────────────
  build-linux-arm64:
    name: Build linux/arm64
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Install libpcap
        run: sudo apt-get update -qq && sudo apt-get install -y libpcap-dev
      - name: Build
        run: |
          mkdir -p dist
          CGO_ENABLED=1 GOOS=linux GOARCH=arm64 \
            go build -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o dist/mcp-flowsentinel-linux-arm64 .
      - uses: actions/upload-artifact@v4
        with:
          name: bin-linux-arm64
          path: dist/

  # ── macOS Intel (macos-13 is the last Intel runner) ──────────────────────────
  build-darwin-amd64:
    name: Build darwin/amd64
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Install libpcap
        run: brew install libpcap
      - name: Build
        run: |
          mkdir -p dist
          CGO_ENABLED=1 GOOS=darwin GOARCH=amd64 \
            go build -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o dist/mcp-flowsentinel-darwin-amd64 .
      - uses: actions/upload-artifact@v4
        with:
          name: bin-darwin-amd64
          path: dist/

  # ── macOS Apple Silicon (macos-latest = ARM runner) ──────────────────────────
  build-darwin-arm64:
    name: Build darwin/arm64
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Install libpcap
        run: brew install libpcap
      - name: Build
        run: |
          mkdir -p dist
          CGO_ENABLED=1 GOOS=darwin GOARCH=arm64 \
            go build -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o dist/mcp-flowsentinel-darwin-arm64 .
      - uses: actions/upload-artifact@v4
        with:
          name: bin-darwin-arm64
          path: dist/

  # ── Windows amd64 (cross-compiled from Ubuntu with mingw-w64 + Npcap SDK) ────
  # We cross-compile rather than use a Windows runner to keep build times low
  # and avoid the Npcap driver installation requirement at compile time.
  build-windows-amd64:
    name: Build windows/amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true
      - name: Install cross-compile toolchain
        run: sudo apt-get update -qq && sudo apt-get install -y mingw-w64 unzip
      - name: Download Npcap SDK
        run: |
          curl -sL https://npcap.com/dist/npcap-sdk-1.13.zip -o npcap-sdk.zip
          unzip -q npcap-sdk.zip -d npcap-sdk
      - name: Build
        env:
          CGO_CFLAGS: "-I${{ github.workspace }}/npcap-sdk/Include"
          CGO_LDFLAGS: "-L${{ github.workspace }}/npcap-sdk/Lib/x64 -lws2_32 -lsetupapi"
        run: |
          mkdir -p dist
          CGO_ENABLED=1 GOOS=windows GOARCH=amd64 CC=x86_64-w64-mingw32-gcc \
            go build -trimpath \
            -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" \
            -o dist/mcp-flowsentinel-windows-amd64.exe .
      - uses: actions/upload-artifact@v4
        with:
          name: bin-windows-amd64
          path: dist/

  # ── Assemble release ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs:
      - build-linux-amd64
      - build-linux-arm64
      - build-darwin-amd64
      - build-darwin-arm64
      - build-windows-amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: false  # no Go source on this runner, cache not needed

      - name: Generate SBOM (SPDX JSON)
        # syft generates a Software Bill of Materials from the Go module graph.
        # The SPDX-JSON format is supported by GitHub's dependency submission API
        # and all major SBOM consumers (Grype, TERN, DependencyTrack, etc.).
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft . -o spdx-json=dist/sbom.spdx.json
          echo "SBOM generated: $(wc -l < dist/sbom.spdx.json) lines"

      - name: Generate SHA256 checksums
        working-directory: dist
        run: sha256sum * > SHA256SUMS.txt && cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          body: |
            ## Install

            ### Windows (no Go required)
            ```powershell
            irm https://raw.githubusercontent.com/ClementG91/MCP-FlowSentinel/main/install.ps1 | iex
            ```
            > **Prerequisite — Npcap:** download from [npcap.com/#download](https://npcap.com/#download) and install with *"WinPcap API-compatible Mode"* checked.

            ### Linux / macOS
            ```bash
            curl -fsSL https://raw.githubusercontent.com/ClementG91/MCP-FlowSentinel/main/install.sh | bash
            ```

            ## Self-update
            ```
            mcp-flowsentinel --update
            ```

            ## Verify
            ```
            mcp-flowsentinel --check
            ```

            See [README](https://github.com/ClementG91/MCP-FlowSentinel#readme) for full documentation and MCP client configuration.
